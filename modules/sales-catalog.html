<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Product Catalog | Autopilot v2 by ANTS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFFFFF;--bg2:#F8FAFC;--bg3:#F1F5F9;--card-bg:#FFFFFF;--border:#E2E8F0;--text:#0F172A;--text2:#475569;--muted:#64748B;--blue:#2563EB;--blue-bg:#EFF6FF;--purple:#7C3AED;--purple-bg:#F5F3FF;--green:#059669;--green-bg:#ECFDF5;--orange:#D97706;--orange-bg:#FFFBEB;--red:#DC2626;--red-bg:#FEF2F2;--cyan:#0891B2;--grad:linear-gradient(135deg,#2563EB,#7C3AED);--radius:12px;--shadow:0 1px 3px rgba(0,0,0,0.05);}
body.dark{--bg:#0F172A;--bg2:#1E293B;--bg3:#334155;--card-bg:#1E293B;--border:#334155;--text:#F8FAFC;--text2:#CBD5E1;--muted:#94A3B8;--blue-bg:rgba(37,99,235,0.15);--purple-bg:rgba(124,58,237,0.15);--green-bg:rgba(5,150,105,0.15);--orange-bg:rgba(217,119,6,0.15);--red-bg:rgba(220,38,38,0.15);}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans Thai', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 14px;
}

.dark-toggle{position:fixed;top:12px;right:12px;z-index:999;background:var(--card-bg);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}

/* Breadcrumb Header */
.header {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow);
  font-size: 0.85rem; color: var(--muted);
}
.header a { color: var(--muted); text-decoration: none; }
.header a:hover { color: var(--blue); }
.header .sep { opacity: 0.4; }
.header .current { color: var(--text); font-weight: 600; }

.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Page Title */
.page-title { margin-bottom: 8px; }
.page-title h2 { font-size: 1.4rem; font-weight: 800; display: flex; align-items: center; gap: 10px; color: var(--text); }
.page-title p { color: var(--muted); font-size: 0.85rem; margin-top: 2px; }

/* Overview Cards */
.overview-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 20px 0; }
.overview-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow);
}
.overview-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.overview-card .label { font-size: 0.75rem; color: var(--muted); }
.overview-card .value { font-size: 1.4rem; font-weight: 800; color: var(--text); }
.overview-card .sub { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

/* Search & Controls */
.controls-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.search-box { flex: 1; min-width: 260px; position: relative; }
.search-box input {
  width: 100%; padding: 10px 14px 10px 40px;
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 0.85rem;
  font-family: inherit; outline: none; transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--blue); }
.search-box input::placeholder { color: var(--muted); }
.search-box .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }

.view-toggle { display: flex; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.view-btn { padding: 10px 16px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; transition: all 0.2s; }
.view-btn.active { background: var(--blue); color: white; }
.sort-select { padding: 10px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.82rem; font-family: inherit; cursor: pointer; outline: none; }
.sort-select option { background: var(--card-bg); }

/* Category Chips */
.chip-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.chip {
  padding: 7px 16px; background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 24px; font-size: 0.82rem; color: var(--muted);
  cursor: pointer; transition: all 0.2s; font-family: inherit; white-space: nowrap;
}
.chip:hover { border-color: var(--blue); color: var(--text); }
.chip.active { background: var(--blue); border-color: var(--blue); color: white; font-weight: 600; }

/* Product Grid */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px; }
.product-grid.list-view { grid-template-columns: 1fr; }

/* Product Card */
.product-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  cursor: pointer; transition: all 0.25s; box-shadow: var(--shadow);
}
.product-card:hover { border-color: var(--blue); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,0.1); }

.product-thumb { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 44px; position: relative; }
.product-thumb .stock-badge { position: absolute; top: 10px; right: 10px; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
.stock-in { background: var(--green-bg); color: var(--green); }
.stock-out { background: var(--red-bg); color: var(--red); }
.stock-order { background: var(--orange-bg); color: var(--orange); }

.product-body { padding: 14px; }
.product-code { font-size: 0.7rem; color: var(--muted); font-family: 'Inter', monospace; letter-spacing: 0.5px; }
.product-name { font-size: 0.9rem; font-weight: 600; margin: 4px 0 8px; line-height: 1.4; color: var(--text); }
.product-cat-badge { display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 600; margin-bottom: 10px; }
.product-price-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
.product-price { font-size: 1.1rem; font-weight: 800; color: var(--blue); }
.product-unit { font-size: 0.75rem; color: var(--muted); }

.btn-add-quote {
  width: 100%; padding: 9px;
  background: var(--grad); border: none; border-radius: 10px;
  color: white; font-size: 0.82rem; font-weight: 600;
  font-family: inherit; cursor: pointer; transition: opacity 0.2s;
}
.btn-add-quote:hover { opacity: 0.85; }
.btn-add-quote:active { transform: scale(0.98); }

/* List View Card */
.list-view .product-card { display: grid; grid-template-columns: 100px 1fr auto; align-items: center; }
.list-view .product-thumb { height: 80px; font-size: 32px; }
.list-view .product-body { padding: 10px 14px; }
.list-view .product-name { font-size: 0.85rem; margin: 2px 0 4px; }
.list-view .product-actions { padding: 10px 14px; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.list-view .product-price-row { margin-bottom: 0; }
.list-view .btn-add-quote { width: auto; padding: 8px 18px; }

.results-count { font-size: 0.82rem; color: var(--muted); margin-bottom: 14px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; padding: 24px; }
.modal-overlay.show { display: flex; }
.modal { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 720px; max-height: 90vh; overflow-y: auto; animation: modalIn 0.25s ease; box-shadow: 0 25px 60px rgba(0,0,0,0.15); }
@keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-size: 1rem; font-weight: 700; color: var(--text); }
.modal-close { width: 36px; height: 36px; background: var(--bg3); border: none; border-radius: 10px; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-body { padding: 22px; }
.modal-product-hero { display: grid; grid-template-columns: 150px 1fr; gap: 18px; margin-bottom: 22px; }
.modal-thumb { height: 130px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
.modal-info .code { font-size: 0.75rem; color: var(--muted); font-family: 'Inter', monospace; }
.modal-info .name { font-size: 1.1rem; font-weight: 700; margin: 4px 0 8px; color: var(--text); }
.modal-info .badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; margin-bottom: 8px; }
.modal-info .vendor { font-size: 0.82rem; color: var(--muted); }
.modal-info .lead-time { font-size: 0.82rem; color: var(--orange); margin-top: 4px; }
.modal-section { margin-bottom: 18px; }
.modal-section h4 { font-size: 0.85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }

/* Pricing Tiers */
.pricing-tiers { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.tier { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
.tier .range { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
.tier .price { font-size: 1.1rem; font-weight: 800; color: var(--blue); }
.tier.best { border-color: var(--green); background: var(--green-bg); }
.tier.best .price { color: var(--green); }
.tier.best::after { content: 'Best Price'; display: block; font-size: 0.65rem; color: var(--green); margin-top: 4px; font-weight: 600; }

/* Specs */
.specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.spec-item { display: flex; justify-content: space-between; padding: 8px 12px; background: var(--bg2); border-radius: 8px; font-size: 0.82rem; }
.spec-item .label { color: var(--muted); }
.spec-item .val { font-weight: 600; color: var(--text); }

/* Mini Chart */
.chart-container { background: var(--bg2); border-radius: 10px; padding: 14px; height: 120px; position: relative; }
.chart-canvas { width: 100%; height: 100%; }
.chart-labels { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--muted); margin-top: 6px; }

/* AI Insight */
.ai-insight {
  background: var(--purple-bg); border: 1px solid rgba(124,58,237,0.2);
  border-radius: 10px; padding: 14px 18px;
  display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: var(--text);
}
.ai-insight .ai-icon { width: 36px; height: 36px; background: var(--grad); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: white; flex-shrink: 0; }

.modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
.btn-modal { padding: 10px 22px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; font-family: inherit; cursor: pointer; border: none; transition: opacity 0.2s; }
.btn-modal.primary { background: var(--grad); color: white; }
.btn-modal.secondary { background: var(--bg3); color: var(--text); }

/* Toast */
.toast { position: fixed; bottom: 32px; right: 32px; background: var(--green); color: white; padding: 14px 24px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; z-index: 2000; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
.toast.show { transform: translateY(0); opacity: 1; }

/* Responsive */
@media (max-width: 768px) {
  .overview-row { grid-template-columns: 1fr; }
  .modal-product-hero { grid-template-columns: 1fr; }
  .pricing-tiers { grid-template-columns: 1fr; }
  .specs-grid { grid-template-columns: 1fr; }
  .controls-bar { flex-direction: column; align-items: stretch; }
  .search-box { min-width: unset; }
  .list-view .product-card { grid-template-columns: 80px 1fr; }
  .list-view .product-actions { display: none; }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
</style>

let activeCategory = 'all';
let currentView = 'grid';
let searchTerm = '';

function getCat(id) { return categories.find(c => c.id === id) || categories[categories.length - 1]; }

function renderChips() {
  document.getElementById('chipRow').innerHTML = categories.map(c =>
    `<button class="chip ${c.id === activeCategory ? 'active' : ''}" onclick="filterCategory('${c.id}')">${c.name}</button>`
  ).join('');
}

function filterCategory(id) { activeCategory = id; renderChips(); renderProducts(); }

function setView(v) {
  currentView = v;
  document.getElementById('gridBtn').classList.toggle('active', v === 'grid');
  document.getElementById('listBtn').classList.toggle('active', v === 'list');
  renderProducts();
}

function getFiltered() {
  let list = [...products];
  if (activeCategory !== 'all') list = list.filter(p => p.cat === activeCategory);
  if (searchTerm) { const q = searchTerm.toLowerCase(); list = list.filter(p => p.code.toLowerCase().includes(q) || p.name.toLowerCase().includes(q) || getCat(p.cat).name.toLowerCase().includes(q)); }
  const sort = document.getElementById('sortSelect').value;
  if (sort === 'name') list.sort((a, b) => a.name.localeCompare(b.name, 'th'));
  else if (sort === 'price-asc') list.sort((a, b) => a.price - b.price);
  else if (sort === 'price-desc') list.sort((a, b) => b.price - a.price);
  else if (sort === 'code') list.sort((a, b) => a.code.localeCompare(b.code));
  return list;
}

function stockLabel(s) {
  if (s === 'in') return { text: 'มีสินค้า', cls: 'stock-in' };
  if (s === 'out') return { text: 'สินค้าหมด', cls: 'stock-out' };
  return { text: 'สั่งได้', cls: 'stock-order' };
}

function renderProducts() {
  const list = getFiltered();
  const grid = document.getElementById('productGrid');
  grid.className = 'product-grid' + (currentView === 'list' ? ' list-view' : '');
  document.getElementById('resultsCount').textContent = `แสดง ${list.length} จาก ${products.length} รายการ`;
  if (list.length === 0) { grid.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);grid-column:1/-1;"><div style="font-size:48px;margin-bottom:12px;">&#128269;</div><div>ไม่พบสินค้าที่ค้นหา</div></div>'; return; }
  grid.innerHTML = list.map((p, i) => {
    const cat = getCat(p.cat); const st = stockLabel(p.stock);
    if (currentView === 'list') {
      return `<div class="product-card" onclick="openModal(${products.indexOf(p)})">
        <div class="product-thumb" style="background:${cat.bg}">${cat.icon}</div>
        <div class="product-body"><div class="product-code">${p.code}</div><div class="product-name">${p.name}</div><span class="product-cat-badge" style="background:${cat.bg};color:${cat.color}">${cat.name}</span><span class="${st.cls}" style="padding:3px 8px;border-radius:8px;font-size:0.7rem;font-weight:600;margin-left:6px;">${st.text}</span></div>
        <div class="product-actions"><div class="product-price-row"><span class="product-price">&#3647;${p.price.toLocaleString()}</span><span class="product-unit" style="margin-left:6px;">/${p.unit}</span></div><button class="btn-add-quote" onclick="event.stopPropagation();addToQuote('${p.code}','${p.name}')">&#128230; เพิ่มในใบเสนอราคา</button></div>
      </div>`;
    }
    return `<div class="product-card" onclick="openModal(${products.indexOf(p)})">
      <div class="product-thumb" style="background:${cat.bg}">${cat.icon}<div class="stock-badge ${st.cls}">${st.text}</div></div>
      <div class="product-body"><div class="product-code">${p.code}</div><div class="product-name">${p.name}</div><span class="product-cat-badge" style="background:${cat.bg};color:${cat.color}">${cat.name}</span><div class="product-price-row"><span class="product-price">&#3647;${p.price.toLocaleString()}</span><span class="product-unit">/${p.unit}</span></div><button class="btn-add-quote" onclick="event.stopPropagation();addToQuote('${p.code}','${p.name}')">&#128230; เพิ่มในใบเสนอราคา</button></div>
    </div>`;
  }).join('');
}

function openModal(idx) {
  const p = products[idx]; const cat = getCat(p.cat); const st = stockLabel(p.stock);
  document.getElementById('modalTitle').textContent = p.name;
  const specLabels = {power:'กำลัง',weight:'น้ำหนัก',warranty:'รับประกัน',origin:'แหล่งผลิต',size:'ขนาด',range:'ช่วง',connection:'เชื่อมต่อ',battery:'แบตเตอรี่',dpi:'DPI','switch':'สวิตช์',layout:'เลย์เอาต์',gsm:'แกรม',sheets:'จำนวนแผ่น',color:'สี',tip:'ขนาดหัว',ink:'หมึก',perBox:'ต่อกล่อง',colors:'สีที่มี',standard:'มาตรฐาน',material:'วัสดุ',sole:'พื้น',toe:'หัว',phase:'เฟส',rpm:'RPM',frame:'เฟรม',tank:'ถัง',pressure:'แรงดัน',layer:'ชั้น',type:'ประเภท',print:'พิมพ์',width:'ความกว้าง',length:'ความยาว',adhesive:'กาว',volume:'ปริมาตร',ph:'pH',scent:'กลิ่น',temp:'อุณหภูมิใช้งาน',use:'การใช้งาน',amp:'แอมป์',pole:'Pole',curve:'Curve','class':'ชั้นคุณภาพ',finish:'ผิว',load:'รับน้ำหนัก',thickness:'ความหนา'};
  const specRows = Object.entries(p.specs).map(([k, v]) => `<div class="spec-item"><span class="label">${specLabels[k]||k}</span><span class="val">${v}</span></div>`).join('');
  const chartId = 'priceChart_' + idx;
  const months = ['พ.ย.','ธ.ค.','ม.ค.','ก.พ.','มี.ค.','เม.ย.'];
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-product-hero">
      <div class="modal-thumb" style="background:${cat.bg}">${cat.icon}</div>
      <div class="modal-info"><div class="code">${p.code}</div><div class="name">${p.name}</div><span class="badge" style="background:${cat.bg};color:${cat.color}">${cat.name}</span><span class="${st.cls}" style="padding:4px 10px;border-radius:8px;font-size:0.75rem;font-weight:600;margin-left:8px;">${st.text}</span><div class="vendor">&#127970; ผู้จำหน่าย: ${p.vendor}</div><div class="lead-time">&#128666; Lead Time: ${p.lead}</div></div>
    </div>
    <div class="modal-section"><h4>&#128176; ราคาตามปริมาณ</h4><div class="pricing-tiers"><div class="tier"><div class="range">1-10 ${p.unit}</div><div class="price">&#3647;${p.tiers[0].toLocaleString()}</div></div><div class="tier"><div class="range">11-50 ${p.unit}</div><div class="price">&#3647;${p.tiers[1].toLocaleString()}</div></div><div class="tier best"><div class="range">50+ ${p.unit}</div><div class="price">&#3647;${p.tiers[2].toLocaleString()}</div></div></div></div>
    <div class="modal-section"><h4>&#128203; สเปคสินค้า</h4><div class="specs-grid">${specRows}</div></div>
    <div class="modal-section"><h4>&#128200; ประวัติราคา 6 เดือน</h4><div class="chart-container"><canvas id="${chartId}" class="chart-canvas"></canvas></div><div class="chart-labels">${months.map(m => `<span>${m}</span>`).join('')}</div></div>
    <div class="modal-section"><div class="ai-insight"><div class="ai-icon">AI</div><div><strong>AI Insight:</strong> ${p.insight}</div></div></div>`;
  setTimeout(() => drawChart(chartId, p.history), 50);
  document.getElementById('modalAddBtn').onclick = () => { addToQuote(p.code, p.name); closeModal(); };
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function drawChart(canvasId, data) {
  const canvas = document.getElementById(canvasId); if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width; canvas.height = rect.height;
  const w = canvas.width, h = canvas.height, pad = { top: 10, right: 10, bottom: 10, left: 10 };
  const min = Math.min(...data) * 0.98, max = Math.max(...data) * 1.02;
  const points = data.map((v, i) => ({ x: pad.left + (i / (data.length - 1)) * (w - pad.left - pad.right), y: pad.top + (1 - (v - min) / (max - min)) * (h - pad.top - pad.bottom) }));
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(37,99,235,0.3)'); grad.addColorStop(1, 'rgba(37,99,235,0.02)');
  ctx.beginPath(); ctx.moveTo(points[0].x, h); points.forEach(p => ctx.lineTo(p.x, p.y)); ctx.lineTo(points[points.length - 1].x, h); ctx.closePath(); ctx.fillStyle = grad; ctx.fill();
  ctx.beginPath(); points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)); ctx.strokeStyle = '#2563EB'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();
  points.forEach((p, i) => { ctx.beginPath(); ctx.arc(p.x, p.y, i === data.length - 1 ? 5 : 3, 0, Math.PI * 2); ctx.fillStyle = i === data.length - 1 ? '#2563EB' : '#60A5FA'; ctx.fill(); if (i === data.length - 1) { ctx.strokeStyle = 'rgba(37,99,235,0.3)'; ctx.lineWidth = 6; ctx.stroke(); } });
  const isDark = document.body.classList.contains('dark');
  const last = points[points.length - 1];
  ctx.font = '600 12px Inter, sans-serif';
  ctx.fillStyle = isDark ? '#F8FAFC' : '#0F172A';
  ctx.textAlign = 'right';
  ctx.fillText('\u0E3F' + data[data.length - 1].toLocaleString(), last.x - 8, last.y - 10);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

function addToQuote(code, name) {
  const toast = document.getElementById('toast');
  toast.innerHTML = `&#9989; เพิ่ม ${code} — ${name} ในใบเสนอราคาแล้ว`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

document.getElementById('searchInput').addEventListener('input', function() { searchTerm = this.value; renderProducts(); });
document.getElementById('sortSelect').addEventListener('change', renderProducts);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderChips();
renderProducts();
